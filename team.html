        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Arial Black", Arial, sans-serif;
                background: #fff;
                color: #000;
                text-align: center;
            }

            /* LANGUAGE SWITCH */
            .lang-switch {
                position: absolute;
                top: 20px;
                right: 20px;
                font-weight: bold;
            }

            .lang-switch a {
                text-decoration: none;
                color: #000;
                border: 2px solid #000;
                padding: 0.4rem 0.8rem;
                transition: 0.2s;
            }

            .lang-switch a:hover {
                background: #000;
                color: #fff;
            }

            /* SECTION */
            .section {
                min-height: 100vh;
                padding: 4rem 2rem;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            /* TITLE */
            h1 {
                font-size: 6vw;
                margin-bottom: 2rem;
            }

            h2 {
                margin: 3rem 0 1.5rem;
                font-size: 2rem;
            }

            /* TEAM GRID */
            .team-container {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                gap: 2rem;
                flex-wrap: wrap;
            }

            /* MEMBER */
            .team-member {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                width: 160px;
                padding: 0.5rem;
                transition: 0.2s;
                border: 3px solid transparent;
            }

            .team-member:hover {
                border-color: #000;
            }

            /* CLICKABLE WRAP */
            .team-link {
                text-decoration: none;
                color: inherit;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            /* IMAGE BOX */
            .team-block {
                width: 150px;
                height: 150px;
                background: #000;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: 0.25s ease;
            }

            .team-block img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.25s ease;
            }

            .team-link:hover .team-block img {
                transform: scale(1.05);
            }

            .team-member:hover .team-block {
                transform: scale(1.05);
            }

            /* TEXT */
            .team-name {
                margin-top: 10px;
                font-weight: 700;
                min-height: 2.4em;
            }

            .team-nick {
                font-size: 0.85rem;
                opacity: 0.6;
                min-height: 1.2em;
            }

            .team-role {
                font-size: 0.9rem;
                opacity: 0.7;
                min-height: 1.2em;
            }

            /* BACK BUTTON */
            .back {
                margin-top: 3rem;
                padding: 1rem 2rem;
                border: 2px solid #000;
                font-weight: bold;
                transition: 0.3s;
                text-decoration: none;
                color: #000;
                display: inline-block;
            }

            .back:hover {
                transform: scale(1.05);
            }

            /* MOBILE */
            @media (max-width: 768px) {
                h1 {
                    font-size: 12vw;
                }

                .team-block {
                    width: 110px;
                    height: 110px;
                }

                .team-member {
                    width: 130px;
                }
            }
        </style>
    </head>

    <body>
        <div class="section">
