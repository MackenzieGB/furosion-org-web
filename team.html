* {

body {

/* --- Section --- */
.section {
    min-height: 100vh;
    padding: 4rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* --- Title --- */
h1 {

h2 {

/* --- Team Layout --- */
.team-container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 2rem;
    flex-wrap: wrap;
}

/* --- Member --- */
.team-member {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    width: 160px; /* key for alignment */
}

/* clickable wrapper */
.team-link {
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* --- Block --- */
.team-block {
    width: 150px;
    height: 150px;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}

.team-block img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.25s ease;
}

.team-link:hover .team-block img {
    transform: scale(1.05);
}

.team-member:hover .team-block {
    transform: scale(1.05);
}

/* --- Text (aligned fix) --- */
.team-name {
    margin-top: 10px;
    font-weight: 700;
    line-height: 1.2;
    min-height: 2.4em;
}

.team-nick {

    min-height: 1.2em;
}

.team-role {
    font-size: 0.9rem;
    opacity: 0.7;
    min-height: 1.2em;
}

/* --- Back button --- */
.back {
    margin-top: 3rem;
    padding: 1rem 2rem;
    border: 2px solid #000;
    font-weight: bold;
    transition: 0.3s;
    text-decoration: none;
    color: #000;
    display: inline-block;
}

.back:hover {
    transform: scale(1.05);
}

/* --- Responsive --- */
@media (max-width: 768px) {
